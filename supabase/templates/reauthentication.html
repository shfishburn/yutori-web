<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification code</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f7;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border-radius:16px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#E8632B,#D45520);padding:32px 24px;text-align:center;">
              <h1 style="margin:0;font-size:24px;font-weight:700;color:#ffffff;letter-spacing:0.3px;">Yutori</h1>
              <p style="margin:6px 0 0;font-size:14px;color:rgba(255,255,255,0.85);">Thermal Wellness</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px 24px;">
              <h2 style="margin:0 0 12px;font-size:20px;font-weight:600;color:#1c1c1e;">Verification code</h2>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.5;color:#3a3a3c;">
                Enter the code below to verify your identity before making changes to your Yutori account.
              </p>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <div style="display:inline-block;padding:16px 40px;background-color:#f5f5f7;border-radius:12px;border:1px solid #e5e5ea;">
                      <span style="font-size:32px;font-weight:700;letter-spacing:8px;color:#1c1c1e;">{{ .Token }}</span>
                    </div>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:13px;line-height:1.5;color:#8e8e93;">
                This code expires in 1 hour. If you didn't request this code, please secure your account immediately.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 24px 24px;border-top:1px solid #e5e5ea;text-align:center;">
              <p style="margin:0;font-size:12px;color:#8e8e93;">
                &copy; 2026 <a href="https://yutorilabs.com" style="color:#8e8e93;text-decoration:none;">yutorilabs.com</a> &middot; Yutori Labs
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
